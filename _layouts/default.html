<!DOCTYPE html>
<html lang="en" class="h-full scroll-smooth" x-data="{ darkMode: localStorage.getItem('darkMode') === 'true' || (!('darkMode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches) }" :class="{ 'dark': darkMode }">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }} | RunTree</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  
  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS v3 Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  
  <!-- Alpine.js CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <style type="text/tailwindcss">
    /* Prevent FOUC (Flash of Unstyled Content) for Alpine cloak */
    [x-cloak] { display: none !important; }

    /* Custom Prose Styles for markdown rendered docs */
    .prose h1 {
      @apply text-3xl sm:text-4xl font-extrabold text-slate-950 dark:text-white mt-8 mb-6 tracking-tight border-b border-slate-200 dark:border-slate-800 pb-3;
    }
    .prose h2 {
      @apply text-xl sm:text-2xl font-bold text-slate-900 dark:text-slate-100 mt-8 mb-4 tracking-tight;
    }
    .prose h3 {
      @apply text-lg font-semibold text-slate-900 dark:text-slate-100 mt-6 mb-2;
    }
    .prose p {
      @apply text-slate-600 dark:text-slate-400 mb-4 leading-relaxed;
    }
    .prose ul {
      @apply list-disc list-inside text-slate-600 dark:text-slate-400 mb-6 space-y-2 pl-4;
    }
    .prose ol {
      @apply list-decimal list-inside text-slate-600 dark:text-slate-400 mb-6 space-y-2 pl-4;
    }
    .prose li {
      @apply mb-1;
    }
    .prose code {
      @apply font-mono text-sm bg-slate-100 dark:bg-slate-900 px-1.5 py-0.5 rounded text-indigo-600 dark:text-indigo-400 font-semibold;
    }
    .prose pre {
      @apply bg-slate-900 dark:bg-slate-950 text-slate-200 p-5 rounded-2xl overflow-x-auto mb-6 border border-slate-800 dark:border-slate-800/80 font-mono text-sm leading-relaxed;
    }
    .prose pre code {
      @apply p-0 bg-transparent text-slate-200 font-normal;
    }
    .prose a {
      @apply text-indigo-600 dark:text-indigo-400 hover:underline font-semibold;
    }
  </style>
</head>
<body class="h-full bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 flex flex-col font-sans transition-colors duration-200">

  <!-- Nav Header -->
  <header class="sticky top-0 z-40 w-full border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <!-- Logo -->
      <a href="{{ site.baseurl }}/" class="flex items-center space-x-2 group">
        <div class="p-2 bg-indigo-600 dark:bg-indigo-500 rounded-lg text-white group-hover:scale-105 transition-transform">
          <!-- Tree SVG Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" x-show="false" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" x-show="false" />
            <!-- Custom Tree Icon -->
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 2a2 2 0 012 2v2.5a3.5 3.5 0 010 7V22H10V13.5a3.5 3.5 0 010-7V4a2 2 0 012-2z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 7.5a4.5 4.5 0 00-4.5 4.5v0A4.5 4.5 0 0012 16.5a4.5 4.5 0 004.5-4.5v0A4.5 4.5 0 0012 7.5z" />
          </svg>
        </div>
        <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-indigo-600 to-violet-600 dark:from-indigo-400 dark:to-violet-400 bg-clip-text text-transparent">RunTree</span>
      </a>

      <!-- Navigation -->
      <nav class="flex items-center space-x-6">
        <a href="{{ site.baseurl }}/" class="text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">Flows</a>
        <a href="{{ site.baseurl }}/docs" class="text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">Documentation</a>
        
        <!-- Divider -->
        <span class="h-4 w-px bg-slate-200 dark:bg-slate-800"></span>

        <!-- Dark Mode Toggle -->
        <button 
          @click="darkMode = !darkMode; localStorage.setItem('darkMode', darkMode)" 
          type="button" 
          class="p-2 rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500"
          aria-label="Toggle dark mode"
        >
          <!-- Sun Icon (visible in dark mode) -->
          <svg x-show="darkMode" x-cloak xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
          </svg>
          <!-- Moon Icon (visible in light mode) -->
          <svg x-show="!darkMode" x-cloak xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <!-- Main Content Wrapper -->
  <main class="flex-grow max-w-6xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {{ content }}
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 transition-colors duration-200">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col sm:flex-row items-center justify-between text-xs text-slate-500 dark:text-slate-400 space-y-3 sm:space-y-0">
      <div>
        &copy; 2026 Kyle Spillane. Released under the GPLv3 License.
      </div>
      <div class="flex space-x-4">
        <a href="{{ site.baseurl }}/" class="hover:text-slate-900 dark:hover:text-slate-100 transition-colors">Home</a>
        <span>&middot;</span>
        <a href="{{ site.baseurl }}/docs" class="hover:text-slate-900 dark:hover:text-slate-100 transition-colors">Documentation</a>
      </div>
    </div>
  </footer>

</body>
</html>
